name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Android
      run: ./gradlew :androidApp:assembleDebug
    
    - name: Build Desktop
      run: ./gradlew :desktopApp:compileKotlinDesktop
    
    - name: Run Tests
      run: ./gradlew :shared:desktopTest :shared:testDebugUnitTest :shared:testReleaseUnitTest :shared:jsNodeTest